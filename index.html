<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        .header {
            height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .header h1 {
            color: #808080;
            font-size: 28px;
            padding: 20px;
            margin: 0;
        }

        .scroll-hint {
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* Контейнеры для карточек */
        .container {
            min-height: 25vh; /* Увеличил, чтобы текст не слипался */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 20px; /* Отступ между карточками */
        }

        .card {
            background-color: #808080;
            color: white;
            width: 85%;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 0.8s ease-out;
        }

        .card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .card b {
            font-size: 22px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Заказывай 3-Д модели только у нас!</h1>
        <div class="scroll-hint">▼ Листай вниз ▼</div>
    </div>

    <!-- Первая карточка -->
    <div class="container">
        <div class="card reveal-card">
            <b>Быстрая доставка:</b>
            печать идет несколько часов, и быстрая доставка по "Нова Пошта"
        </div>
    </div>

    <!-- Вторая карточка -->
    <div class="container">
        <div class="card reveal-card">
            <b>Разнообразность моделей:</b>
            Можно заказать любую модель, игрушку или фигурку на вашу полку!
        </div>
    </div>

    <script>
        // Находим все карточки с классом reveal-card
        const cards = document.querySelectorAll('.reveal-card');

        function checkScroll() {
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                // Если верх карточки зашел в область видимости (на 95% высоты экрана)
                if (rect.top < window.innerHeight * 0.95) {
                    card.classList.add('active');
                }
            });
        }

        window.addEventListener('scroll', checkScroll);
        // Запускаем проверку сразу при загрузке (на случай, если страница уже прокручена)
        checkScroll();

        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
