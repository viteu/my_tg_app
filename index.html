<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ИСПРАВЛЕНО: Правильная ссылка на скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Чтобы можно было листать */
            min-height: 150vh; 
        }

        /* Заголовок сверху */
        .header-text {
            color: #808080;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        /* Контейнер для квадрата */
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        /* Серый квадрат */
        .card {
            background-color: #808080;
            color: white;
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-sizing: border-box;

            /* Начальное состояние: невидимый и уменьшен */
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            transition: all 0.6s ease-out;
        }

        /* Состояние, когда квадрат ВИДЕН */
        .card.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .card b {
            font-size: 20px;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header-text">
        Заказывай 3-Д модели только у нас!
    </div>

    <div class="container">
        <div class="card" id="myCard">
            <b>Быстрая доставка:</b>
            печать идет несколько часов, и быстрая доставка по "нова пошта"
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const card = document.getElementById('myCard');

        // Инициализация Telegram
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#ffffff');

        function handleScroll() {
            const rect = card.getBoundingClientRect();
            const windowHeight = window.innerHeight;

            // Условие: если центр карточки находится в видимой области экрана
            // Появится, когда войдет в экран, и исчезнет, когда выйдет за границы
            if (rect.top < windowHeight * 0.9 && rect.bottom > windowHeight * 0.1) {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }
        }

        // Запускаем проверку при скролле
        window.addEventListener('scroll', handleScroll);
        
        // Запускаем один раз при старте, чтобы проверить положение
        handleScroll();
    </script>
</body>
</html>
