<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Первый экран */
        .header {
            height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .header h1 {
            color: #808080;
            font-size: 28px;
            padding: 20px;
            margin: 0;
        }

        .scroll-hint {
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* Второй экран - уменьшили высоту до 20% от экрана */
        .container {
            height: 20vh; 
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Прижали квадрат к верху контейнера */
        }

        .card {
            background-color: #808080;
            color: white;
            width: 85%;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            
            /* Начальное состояние */
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 0.8s ease-out;
        }

        /* Класс активации */
        .card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .card b {
            font-size: 22px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Заказывай 3-Д модели только у нас!</h1>
        <div class="scroll-hint">▼ Листай вниз ▼</div>
    </div>

    <div class="container">
        <div class="card" id="myCard">
            <b>Быстрая доставка:</b>
            печать идет несколько часов, и быстрая доставка по "нова пошта"
        </div>
    </div>

    <script>
        const card = document.getElementById('myCard');

        window.addEventListener('scroll', () => {
            const rect = card.getBoundingClientRect();
            
            // Срабатывает, как только верхний край квадрата показался внизу экрана
            if (rect.top < window.innerHeight * 0.95) {
                card.classList.add('active');
            }
        });

        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
