<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Первый экран */
        .header {
            height: 100vh; /* Занимает ВЕСЬ экран */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .header h1 {
            color: #808080; /* Серый цвет текста */
            font-size: 28px;
            padding: 20px;
        }

        .scroll-hint {
            color: #aaa;
            font-size: 14px;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* Второй экран с квадратом */
        .container {
            height: 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Серый квадрат */
        .card {
            background-color: #808080; /* Серый фон */
            color: white; /* Белый текст */
            width: 85%;
            padding: 30px;
            border-radius: 25px; /* Закругленные углы */
            text-align: center;
            
            /* Начальное состояние (невидимый и внизу) */
            opacity: 0;
            transform: translateY(100px) scale(0.9);
            transition: all 1s ease-out; /* Плавность появления */
        }

        /* Класс, который включит анимацию */
        .card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .card b {
            font-size: 22px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Заказывай 3-Д модели только у нас!</h1>
        <div class="scroll-hint">▼ Листай вниз ▼</div>
    </div>

    <div class="container">
        <div class="card" id="myCard">
            <b>Быстрая доставка:</b>
            печать идет несколько часов, и быстрая доставка по "нова пошта"
        </div>
    </div>

    <script>
        const card = document.getElementById('myCard');

        // Функция слежки за скроллом
        window.addEventListener('scroll', () => {
            const speed = 1.3; // Насколько рано появится блок
            const rect = card.getBoundingClientRect();
            
            // Если блок показался внизу экрана
            if (rect.top < window.innerHeight / speed) {
                card.classList.add('active');
            }
        });

        // Сообщаем Telegram, что приложение готово
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
